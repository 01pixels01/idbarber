    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1344" y1="0" x2="1344" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
    <line x1="1728" y1="0" x2="1728" y2="1080"/>
  </g>
  <!-- Gold orb glow -->
  <ellipse cx="960" cy="540" rx="500" ry="300" fill="#D4AF37" opacity="0.04"/>
  <!-- Scissors icon center -->
  <g transform="translate(910,460)" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3">
    <line x1="20" y1="80" x2="80" y2="20"/>
    <line x1="20" y1="20" x2="80" y2="80"/>
    <circle cx="15" cy="85" r="12" stroke-width="2"/>
    <circle cx="85" cy="85" r="12" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text x="960" y="580" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#D4AF37" opacity="0.6" letter-spacing="4">HERO BACKGROUND · 1920 × 1080 px</text>
  <text x="960" y="605" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888" opacity="0.5">Reemplazar con imagen hiperrealista de barbería nocturna</text>
