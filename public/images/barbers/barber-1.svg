<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1A1200"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <!-- Silhouette barber -->
  <ellipse cx="400" cy="260" rx="90" ry="100" fill="#1A1A1A"/>
  <rect x="270" y="350" width="260" height="380" rx="20" fill="#111111"/>
  <!-- Gold accent - apron line -->
  <rect x="270" y="350" width="260" height="4" fill="#D4AF37" opacity="0.6"/>
  <!-- Razor in hand -->
  <rect x="490" y="380" width="4" height="60" rx="2" fill="#D4AF37" opacity="0.8" transform="rotate(-20,492,410)"/>
  <!-- Label -->
  <rect x="160" y="780" width="480" height="1" fill="#D4AF37" opacity="0.2"/>
  <text x="400" y="820" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D4AF37" opacity="0.7" letter-spacing="3">CARLOS MENDOZA · MASTER BARBER</text>
  <text x="400" y="845" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555" letter-spacing="2">800 × 1000 px · Retrato hiperrealista</text>
  <!-- Corner marks -->
  <rect x="20" y="20" width="30" height="2" fill="#D4AF37" opacity="0.5"/>
  <rect x="20" y="20" width="2" height="30" fill="#D4AF37" opacity="0.5"/>
  <rect x="750" y="20" width="30" height="2" fill="#D4AF37" opacity="0.5"/>
  <rect x="778" y="20" width="2" height="30" fill="#D4AF37" opacity="0.5"/>
  <rect x="20" y="978" width="30" height="2" fill="#D4AF37" opacity="0.5"/>
  <rect x="20" y="950" width="2" height="30" fill="#D4AF37" opacity="0.5"/>
  <rect x="750" y="978" width="30" height="2" fill="#D4AF37" opacity="0.5"/>
  <rect x="778" y="950" width="2" height="30" fill="#D4AF37" opacity="0.5"/>
</svg>
