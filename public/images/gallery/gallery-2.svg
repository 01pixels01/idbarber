<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="60%" cy="30%" r="80%"><stop offset="0%" stop-color="#0F0F0F"/><stop offset="100%" stop-color="#060606"/></radialGradient>
    <radialGradient id="light" cx="70%" cy="20%" r="45%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/><stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#light)"/>
  <!-- Floor -->
  <rect x="0" y="630" width="1200" height="270" fill="#080808"/>
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Close-up of hands + fade cut on head -->
  <!-- Head shape -->
  <ellipse cx="600" cy="300" rx="140" ry="160" fill="#1A1A1A"/>
  <!-- Hair texture -->
  <ellipse cx="600" cy="220" rx="130" ry="90" fill="#161616"/>
  <!-- Clipper in hand -->
  <rect x="700" y="280" width="80" height="35" rx="8" fill="#141414"/>
  <rect x="780" y="290" width="30" height="15" rx="4" fill="#1A1A1A"/>
  <!-- Detail line (fade line) -->
  <path d="M480,380 Q600,360 720,380" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Hand holding clipper -->
  <ellipse cx="740" cy="297" rx="50" ry="25" fill="#1A1A1A"/>
  <rect x="700" y="272" width="80" height="20" rx="10" fill="#141414"/>
  <!-- Neck -->
  <rect x="545" y="450" width="110" height="100" rx="8" fill="#141414"/>
  <!-- Barber apron strap -->
  <path d="M460,480 Q600,500 740,480" stroke="#141414" stroke-width="30" fill="none"/>
  <!-- Background interior elements -->
  <rect x="50" y="100" width="200" height="8" rx="2" fill="#111"/>
  <rect x="50" y="200" width="200" height="8" rx="2" fill="#111"/>
  <!-- Products on shelf -->
  <rect x="60" y="170" width="24" height="34" rx="5" fill="#141414"/>
  <rect x="92" y="165" width="18" height="38" rx="5" fill="#141414"/>
  <rect x="118" y="170" width="26" height="34" rx="5" fill="#141414"/>
  <!-- Window light effect -->
  <rect x="950" y="0" width="250" height="630" fill="#D4AF37" opacity="0.015"/>
  <line x1="950" y1="0" x2="950" y2="630" stroke="#D4AF37" stroke-width="0.5" opacity="0.08"/>
  <!-- Caption -->
  <text x="600" y="700" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D4AF37" opacity="0.6" letter-spacing="4">GALLERY 02 · 1200 × 900 px</text>
  <text x="600" y="725" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555" letter-spacing="2">Fade cut close-up · clipper en mano · hiperrealista · profundidad de campo</text>
  <rect x="20" y="20" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="20" y="20" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="1150" y="20" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="1178" y="20" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="20" y="878" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="20" y="850" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="1150" y="878" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="1178" y="850" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
</svg>
