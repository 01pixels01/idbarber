<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="80%"><stop offset="0%" stop-color="#0F0F0F"/><stop offset="100%" stop-color="#060606"/></radialGradient>
    <radialGradient id="light" cx="30%" cy="20%" r="50%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/><stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#light)"/>
  <!-- Floor -->
  <rect x="0" y="650" width="1200" height="250" fill="#090909"/>
  <line x1="0" y1="650" x2="1200" y2="650" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Barber chair silhouette -->
  <rect x="380" y="380" width="200" height="260" rx="30" fill="#111"/>
  <rect x="340" y="590" width="280" height="20" rx="5" fill="#141414"/>
  <rect x="370" y="610" width="16" height="70" rx="5" fill="#141414"/>
  <rect x="574" y="610" width="16" height="70" rx="5" fill="#141414"/>
  <!-- Footrest -->
  <rect x="360" y="614" width="240" height="12" rx="4" fill="#1A1A1A"/>
  <!-- Headrest -->
  <rect x="410" y="358" width="140" height="32" rx="10" fill="#141414"/>
  <!-- Armrests -->
  <rect x="350" y="510" width="60" height="12" rx="6" fill="#1A1A1A"/>
  <rect x="550" y="510" width="60" height="12" rx="6" fill="#1A1A1A"/>
  <!-- Client silhouette -->
  <ellipse cx="480" cy="350" rx="55" ry="60" fill="#141414"/>
  <rect x="430" y="400" width="100" height="180" rx="8" fill="#141414"/>
  <!-- Barber silhouette (standing) -->
  <ellipse cx="680" cy="290" rx="45" ry="48" fill="#1A1A1A"/>
  <rect x="638" y="335" width="84" height="190" rx="10" fill="#1A1A1A"/>
  <!-- Arm extending -->
  <rect x="638" y="370" width="90" height="20" rx="8" fill="#141414" transform="rotate(-25,638,370)"/>
  <!-- Scissors detail -->
  <g transform="translate(600,370) rotate(-30)" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.5">
    <line x1="0" y1="0" x2="35" y2="35"/><line x1="35" y1="0" x2="0" y2="35"/>
    <circle cx="-6" cy="40" r="7"/><circle cx="41" cy="40" r="7"/>
  </g>
  <!-- Mirror frame -->
  <rect x="100" y="80" width="300" height="480" rx="8" fill="none" stroke="#222" stroke-width="4"/>
  <rect x="108" y="88" width="284" height="464" rx="4" fill="#0D0D0D"/>
  <rect x="100" y="80" width="300" height="480" rx="8" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.2"/>
  <!-- Shelves in bg -->
  <rect x="800" y="150" width="300" height="8" rx="2" fill="#141414"/>
  <rect x="800" y="280" width="300" height="8" rx="2" fill="#141414"/>
  <!-- Bottles on shelf -->
  <rect x="820" y="120" width="20" height="34" rx="4" fill="#1A1A1A"/>
  <rect x="848" y="115" width="16" height="38" rx="4" fill="#1A1A1A"/>
  <rect x="872" y="120" width="22" height="33" rx="4" fill="#1A1A1A"/>
  <!-- Gold accent light strip -->
  <rect x="0" y="160" width="4" height="400" fill="#D4AF37" opacity="0.15"/>
  <!-- Caption -->
  <text x="600" y="730" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D4AF37" opacity="0.6" letter-spacing="4">GALLERY 01 · 1200 × 900 px</text>
  <text x="600" y="755" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555" letter-spacing="2">Barbero trabajando · luz cinematográfica lateral · hiperrealista</text>
  <rect x="20" y="20" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="20" y="20" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="1150" y="20" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="1178" y="20" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="20" y="878" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="20" y="850" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="1150" y="878" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="1178" y="850" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
</svg>
