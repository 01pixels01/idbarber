<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="85%"><stop offset="0%" stop-color="#0E0E0E"/><stop offset="100%" stop-color="#050505"/></radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#D4AF37" stop-opacity="0.08"/><stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <!-- Floor -->
  <rect x="0" y="680" width="1200" height="220" fill="#070707"/>
  <line x1="0" y1="680" x2="1200" y2="680" stroke="#1A1A1A" stroke-width="1"/>
  <!-- Interior wide shot of barbershop -->
  <!-- Back wall -->
  <rect x="0" y="0" width="1200" height="680" fill="#0A0A0A"/>
  <!-- Gold stripe on wall -->
  <rect x="0" y="200" width="1200" height="2" fill="#D4AF37" opacity="0.12"/>
  <rect x="0" y="500" width="1200" height="2" fill="#D4AF37" opacity="0.08"/>
  <!-- Left station -->
  <rect x="60" y="320" width="220" height="360" rx="4" fill="#111"/>
  <rect x="60" y="320" width="220" height="8" fill="#141414"/>
  <!-- Mirror left -->
  <rect x="70" y="80" width="200" height="230" rx="4" fill="#0D0D0D" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="70" y="80" width="200" height="230" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.2"/>
  <!-- Center station (main) -->
  <rect x="490" y="300" width="220" height="380" rx="4" fill="#111"/>
  <!-- Center mirror (bigger) -->
  <rect x="480" y="60" width="240" height="230" rx="4" fill="#0D0D0D" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="480" y="60" width="240" height="230" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3"/>
  <!-- Right station -->
  <rect x="920" y="320" width="220" height="360" rx="4" fill="#111"/>
  <!-- Mirror right -->
  <rect x="930" y="80" width="200" height="230" rx="4" fill="#0D0D0D" stroke="#1A1A1A" stroke-width="2"/>
  <rect x="930" y="80" width="200" height="230" rx="4" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.2"/>
  <!-- Barber chairs -->
  <ellipse cx="170" cy="595" rx="70" ry="18" fill="#141414"/>
  <rect x="115" y="500" width="110" height="100" rx="20" fill="#141414"/>
  <ellipse cx="600" cy="590" rx="75" ry="18" fill="#141414"/>
  <rect x="545" y="495" width="110" height="100" rx="20" fill="#141414"/>
  <ellipse cx="1030" cy="595" rx="70" ry="18" fill="#141414"/>
  <rect x="975" y="500" width="110" height="100" rx="20" fill="#141414"/>
  <!-- Logo on wall -->
  <text x="600" y="260" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#D4AF37" opacity="0.12" letter-spacing="10">IDBARBER</text>
  <!-- Ceiling light strip -->
  <rect x="400" y="0" width="400" height="4" fill="#D4AF37" opacity="0.15"/>
  <rect x="400" y="4" width="400" height="20" fill="#D4AF37" opacity="0.02"/>
  <!-- Caption -->
  <text x="600" y="740" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#D4AF37" opacity="0.6" letter-spacing="4">GALLERY 03 · 1200 × 900 px</text>
  <text x="600" y="765" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555" letter-spacing="2">Interior barbería premium · 3 puestos · luz cenital · hiperrealista</text>
  <rect x="20" y="20" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="20" y="20" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="1150" y="20" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="1178" y="20" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="20" y="878" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="20" y="850" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
  <rect x="1150" y="878" width="30" height="2" fill="#D4AF37" opacity="0.4"/><rect x="1178" y="850" width="2" height="30" fill="#D4AF37" opacity="0.4"/>
</svg>
